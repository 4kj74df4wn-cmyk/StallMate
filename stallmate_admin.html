<style>
  *{box-sizing:border-box}

<body>
<div class="wrap">
  <h1>🔐 StallMate Admin</h1>
  <p class="sub">ออกโค้ดปลดล็อก — หน้านี้สำหรับ June เท่านั้น ห้ามแชร์ลิงก์นี้ให้ใคร</p>

  <div class="card" id="loginCard">
    <label>อีเมล</label>
    <input type="email" id="loginEmail" placeholder="you@email.com">
    <label>รหัสผ่าน</label>
    <input type="password" id="loginPw" placeholder="รหัสผ่าน">
    <button onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="err" id="loginErr"></div>
    <div class="hint">ต้องสร้างบัญชีนี้ผ่าน Firebase Console ก่อน (Authentication → Add user) ยังสมัครจากหน้านี้ไม่ได้ ตั้งใจปิดไว้เพื่อความปลอดภัย</div>
  </div>

  <div id="genArea">
    <div class="userbar">
      <span id="userEmailLbl"></span>
      <a href="#" onclick="doLogout();return false;" style="color:#f59e0b">ออกจากระบบ</a>
    </div>

    <div class="card">
      <label>จำนวนโค้ดที่ต้องการสร้าง</label>
      <input type="number" id="qty" value="1" min="1" max="30">
      <label>แพ็กเกจ</label>
      <select id="tierSel">
        <option value="paid_once">199 บาท — จ่ายครั้งเดียว (ใช้ได้ตลอดชีพ)</option>
        <option value="paid_annual">699 บาท/ปี — แพ็กเกจทีม (หมดอายุใน 365 วัน)</option>
      </select>
      <button onclick="generateCodes()" id="genBtn">✨ สร้างโค้ด</button>
      <div class="err" id="genErr"></div>
      <div id="resultBox" style="display:none">
        <label>โค้ดที่สร้าง — copy ไปวางใน LINE OA ได้เลย</label>
        <div class="code-list" id="codeList"></div>
      </div>
    </div>

    <div class="card">
      <label style="margin-top:0">โค้ดล่าสุด (20 รายการ)</label>
      <button class="secondary" onclick="loadRecent()">🔄 รีเฟรชรายการ</button>
      <table id="recentTable">
        <thead><tr><th>โค้ด</th><th>แพ็กเกจ</th><th>สถานะ</th></tr></thead>
        <tbody id="recentBody"></tbody>
      </table>
    </div>
  </div>
</div>

const app=firebase.initializeApp(CENTRAL_FIREBASE_CONFIG);
const auth=firebase.auth(app);
const db=firebase.database(app);

const CODE_CHARS='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // ตัดตัวที่สับสนกันออก (0/O, 1/I)
function randSeg(len){
  let s='';
  for(let i=0;i<len;i++) s+=CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)];
  return s;
}
function genCode(){ return 'SM-'+randSeg(4)+'-'+randSeg(4); }

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('loginCard').style.display='none';
    document.getElementById('genArea').style.display='block';
    document.getElementById('userEmailLbl').textContent='เข้าสู่ระบบเป็น: '+user.email;
    loadRecent();
  }else{
    document.getElementById('loginCard').style.display='block';
    document.getElementById('genArea').style.display='none';
  }
});

function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  const errEl=document.getElementById('loginErr');
  errEl.style.display='none';
  auth.signInWithEmailAndPassword(email,pw).catch(e=>{
    errEl.textContent='❌ เข้าสู่ระบบไม่สำเร็จ: '+e.message;
    errEl.style.display='block';
  });
}
function doLogout(){ auth.signOut(); }

async function generateCodes(){
  const qty=Math.max(1,Math.min(30,parseInt(document.getElementById('qty').value)||1));
  const tier=document.getElementById('tierSel').value;
  const btn=document.getElementById('genBtn');
  const errEl=document.getElementById('genErr');
  errEl.style.display='none';
  btn.disabled=true;
  btn.textContent='กำลังสร้าง...';
  const now=new Date();
  const createdAt=now.toISOString();
  const expiresAt=tier==='paid_annual' ? new Date(now.getTime()+365*24*60*60*1000).toISOString() : null;
  const created=[];
  try{
    for(let i=0;i<qty;i++){
      let code, attempts=0;
      // กันโค้ดชนกัน (โอกาสน้อยมาก แต่เช็คไว้กันเหนียว)
      while(true){
        code=genCode();
        const snap=await db.ref('licenses/'+code).once('value');
        if(!snap.exists()) break;
        attempts++;
        if(attempts>10) throw new Error('สร้างโค้ดไม่ซ้ำไม่สำเร็จ ลองใหม่อีกครั้ง');
      }
      await db.ref('licenses/'+code).set({tier,createdAt,expiresAt,redeemed:false});
      created.push(code);
    }
    document.getElementById('resultBox').style.display='block';
    document.getElementById('codeList').textContent=created.join('\n');
    loadRecent();
  }catch(e){
    console.error('Generate fail',e);
    errEl.textContent='❌ สร้างโค้ดไม่สำเร็จ: '+e.message;
    errEl.style.display='block';
  }
  btn.disabled=false;
  btn.textContent='✨ สร้างโค้ด';
}

async function loadRecent(){
  const body=document.getElementById('recentBody');
  body.innerHTML='<tr><td colspan="3">กำลังโหลด...</td></tr>';
  try{
    const snap=await db.ref('licenses').limitToLast(20).once('value');
    const val=snap.val()||{};
    const rows=Object.keys(val).sort().reverse().map(code=>{
      const r=val[code];
      const tierLbl=r.tier==='paid_annual'?'699/ปี':'199 ครั้งเดียว';
      const status=r.redeemed?'<span class="st-yes">ใช้แล้ว</span>':'<span class="st-no">ยังไม่ใช้</span>';
      return '<tr><td>'+code+'</td><td>'+tierLbl+'</td><td>'+status+'</td></tr>';
    });
    body.innerHTML=rows.length?rows.join(''):'<tr><td colspan="3">ยังไม่มีโค้ด</td></tr>';
  }catch(e){
    console.error('Load recent fail',e);
    body.innerHTML='<tr><td colspan="3">โหลดไม่สำเร็จ: '+e.message+'</td></tr>';
  }
}
</script>
